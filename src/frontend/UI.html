<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { background-color: #f8f9fa; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      .container { max-width: 900px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
      .header-section { border-bottom: 2px solid #0d6efd; margin-bottom: 25px; padding-bottom: 10px; }
      .tm-card { border: 1px solid #dee2e6; border-radius: 8px; padding: 15px; margin-bottom: 15px; background-color: #fff; transition: transform 0.2s; }
      .tm-card:hover { transform: scale(1.01); border-color: #0d6efd; }
      .exempt-label { color: #dc3545; font-weight: bold; font-size: 0.85rem; }
      .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
    </style>
  </head>
  <body>

    <div id="loading" class="loading-overlay">
      <div class="spinner-border text-primary" role="status"></div>
      <span class="ms-2">Processing with GS Engine...</span>
    </div>

    <div class="container">
      <div class="header-section">
        <h2 class="text-primary">Enterprise QA KPI Logging</h2>
        <p class="text-muted">Global Quality PPO Engine | Performance Layer</p>
      </div>

      <div id="setup-section">
        <div class="row g-3 align-items-center">
          <div class="col-md-6">
            <label for="tlWdid" class="form-label font-weight-bold">Supervisor WDID</label>
            <input type="text" class="form-control" id="tlWdid" placeholder="Enter your WDID (e.g. 123456)">
          </div>
          <div class="col-md-3">
            <label for="month" class="form-label">Report Month</label>
            <select class="form-select" id="month">
              <option value="January">January</option>
              <option value="February">February</option>
              <option value="March">March</option>
              </select>
          </div>
          <div class="col-md-3">
            <label for="year" class="form-label">Year</label>
            <input type="number" class="form-control" id="year" value="2026">
          </div>
          <div class="col-12 mt-4">
            <button class="btn btn-primary w-100" onclick="loadTeam()">Initialize Team Roster</button>
          </div>
        </div>
      </div>

      <div id="kpi-section" style="display:none;" class="mt-4">
        <h4 id="tl-greeting" class="mb-4"></h4>
        <div id="team-container">
          </div>
        <button class="btn btn-success btn-lg w-100 mt-4" onclick="submitAllKPIs()">Submit Monthly Performance Data</button>
      </div>
    </div>

    <script>
      let currentTeam = [];

      function showLoading(show) {
        document.getElementById('loading').style.display = show ? 'flex' : 'none';
      }

      function loadTeam() {
        const wdid = document.getElementById('tlWdid').value;
        if (!wdid) return alert('Please enter a valid WDID');
        
        showLoading(true);
        
        // Calling the .gs function we created earlier
        google.script.run
          .withSuccessHandler(function(response) {
            showLoading(false);
            if (response.success) {
              renderTeamForm(response);
            } else {
              alert(response.message);
            }
          })
          .loadTLAndTeam(wdid); //
      }

      function renderTeamForm(data) {
        document.getElementById('setup-section').style.display = 'none';
        document.getElementById('kpi-section').style.display = 'block';
        document.getElementById('tl-greeting').innerText = `Team Roster for: ${data.tlDetails.name}`;
        
        currentTeam = data.teamMembers;
        const container = document.getElementById('team-container');
        container.innerHTML = '';

        currentTeam.forEach((member, index) => {
          const card = `
            <div class="tm-card" id="row-${member.wdid}">
              <div class="row">
                <div class="col-md-4">
                  <strong>${member.name}</strong><br>
                  <small class="text-muted">WDID: ${member.wdid}</small>
                </div>
                <div class="col-md-4">
                  <label class="form-label">Accuracy (Accurate/Performed)</label>
                  <div class="input-group input-group-sm">
                    <input type="number" class="form-control" placeholder="Acc" id="acc-${index}">
                    <input type="number" class="form-control" placeholder="Perf" id="perf-${index}">
                  </div>
                </div>
                <div class="col-md-4">
                  <label class="form-label">Productivity (QA Completed)</label>
                  <input type="number" class="form-control form-control-sm" id="prod-${index}">
                </div>
              </div>
            </div>
          `;
          container.innerHTML += card;
        });
      }

      function submitAllKPIs() {
        showLoading(true);
        
        const payload = {
          tlWdid: document.getElementById('tlWdid').value,
          month: document.getElementById('month').value,
          year: document.getElementById('year').value,
          teamMembers: currentTeam.map((m, i) => ({
            wdid: m.wdid,
            accuracy: {
              calAccurate: document.getElementById(`acc-${i}`).value || 0,
              calPerformed: document.getElementById(`perf-${i}`).value || 0
            },
            productivity: {
              qaCompleted: document.getElementById(`prod-${i}`).value || 0
            }
            // Add other KPI fields similarly
          }))
        };

        google.script.run
          .withSuccessHandler(function(res) {
            showLoading(false);
            if (res.success) {
              alert('Data successfully pushed to Global QA Engine!');
              google.script.host.close();
            }
          })
          .submitKPIs(payload); //
      }
    </script>
  </body>
</html>
